# Render blueprint for the DealWing backend (FastAPI).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Secrets marked `sync: false` are prompted for on first deploy (never committed).
services:
  - type: web
    name: dealwing-backend
    runtime: docker
    dockerfilePath: ./be/Dockerfile
    dockerContext: ./be
    plan: starter          # free plan has no persistent disk; starter keeps the SQLite DB
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SCHEDULERS_AUTOSTART
        value: "true"       # single container -> safe to run the cron here
      - key: AUTH_SECRET
        generateValue: true # Render generates a strong random secret
      - key: CORS_ORIGIN
        sync: false          # set to your Vercel URL, e.g. https://dealwing.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: TELEGRAM_SESSION_NAME
        # On the mounted disk -> survives redeploys. Matches the local session file
        # name (growth_agent.session), so that file can be uploaded to /app/data as-is;
        # telegram-login is interactive and cannot be run on Render.
        value: /app/data/growth_agent
      - key: OWNED_CHANNELS
        sync: false          # channels to COLLECT + LEARN from, e.g. GrabOnIndiaOfficial
      - key: PUBLISH_CHANNEL
        sync: false          # the ONLY channel auto-send posts to. Leave BLANK to post
                             # nowhere; set to your test channel to post there instead of
                             # the real one. Never set this to the live channel until you
                             # actually intend every planned post to go out publicly.
      - key: DEAL_API_BASE
        sync: false          # latest-deals endpoint; without it jit_fill fills 0 slots
      - key: DEAL_API_AUTH
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
    disk:
      name: dealwing-data
      mountPath: /app/data   # SQLite DB + raw snapshots persist across deploys
      sizeGB: 1
